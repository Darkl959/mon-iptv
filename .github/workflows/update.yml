name: MAJ IPTV AUTO
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python fusion_globale.py
      - name: Save changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add epg_unique.xml
          git commit -m "MAJ EPG" || exit 0
          git push
          
